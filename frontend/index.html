<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AmberMind AI | Sophisticated Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  background: #1a1410;
  color: #f0ede8;
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
}

.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #3a3028; border-radius: 4px; }
.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }

/* ── SIDEBAR ────────────────────────────── */
#sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: #1e1710;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  padding: 20px 12px;
  flex-shrink: 0;
  transition: width 0.25s ease, min-width 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
  overflow: hidden;
}
#sidebar.collapsed {
  width: 0;
  min-width: 0;
  opacity: 0;
  padding: 0;
  pointer-events: none;
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: rgba(255,183,130,0.4);
  padding: 0 10px;
  margin: 16px 0 6px;
  text-transform: uppercase;
  white-space: nowrap;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13.5px;
  color: rgba(240,237,232,0.65);
  transition: background 0.15s, color 0.15s;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
}
.sidebar-item:hover { background: rgba(255,255,255,0.05); color: #f0ede8; }
.sidebar-item.active {
  background: rgba(201,122,58,0.15);
  color: #ffb782;
  border-left: 2px solid #c97a3a;
  padding-left: 8px;
}
.sidebar-item .mat-icon {
  font-size: 17px;
  flex-shrink: 0;
  font-family: 'Material Symbols Outlined';
  font-weight: 300;
  font-style: normal;
  letter-spacing: normal;
  line-height: 1;
}
.sidebar-item .item-label {
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.sidebar-item .item-actions {
  display: none;
  gap: 2px;
  flex-shrink: 0;
}
.sidebar-item:hover .item-actions { display: flex; }
.sidebar-item .item-actions button {
  background: none;
  border: none;
  color: rgba(240,237,232,0.5);
  cursor: pointer;
  padding: 2px;
  border-radius: 4px;
  font-family: 'Material Symbols Outlined';
  font-size: 14px;
  font-weight: 300;
  line-height: 1;
  transition: color 0.1s, background 0.1s;
}
.sidebar-item .item-actions button:hover { color: #f0ede8; background: rgba(255,255,255,0.08); }

/* ── APP SHELL ──────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  width: 100%;
  align-items: center;
  overflow: hidden;
}

/* ── HOME SCREEN ────────────────────────── */
#home-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  gap: 32px;
}

#greeting {
  font-family: 'Sora', sans-serif;
  font-size: 40px;
  font-weight: 700;
  color: #f0ede8;
  text-align: center;
  letter-spacing: -0.5px;
}

.home-suggestions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 680px;
  padding: 0 24px;
}
.suggestion-chip {
  background: #252320;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 13.5px;
  color: rgba(240,237,232,0.7);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  user-select: none;
}
.suggestion-chip:hover {
  background: #2e2925;
  border-color: rgba(201,122,58,0.3);
  color: #f0ede8;
}

/* ── CHAT THREAD WRAPPER ─────────────────── */
#chat-thread-wrap {
  display: none;
  flex: 1;
  width: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: #3a3028 transparent;
}
#chat-thread-wrap::-webkit-scrollbar { width: 5px; }
#chat-thread-wrap::-webkit-scrollbar-track { background: transparent; }
#chat-thread-wrap::-webkit-scrollbar-thumb { background: #3a3028; border-radius: 4px; }

/* ── CHAT THREAD ────────────────────────── */
#chat-thread {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 740px;
  margin: 0 auto;
  padding: 28px 24px 0;
  min-height: 100%;
}

#messages-container {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding-bottom: 16px;
}

/* ── BOTTOM AREA ────────────────────────── */
#bottom-area {
  width: 100%;
  max-width: 740px;
  margin: 0 auto;
  padding: 10px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}

/* ── FILE PREVIEW STRIP ─────────────────── */
#file-preview-strip {
  display: none;
  flex-direction: row;
  flex-wrap: nowrap;
  overflow-x: auto;
  gap: 10px;
  padding: 4px 0 6px;
  scrollbar-width: none;
}
#file-preview-strip.has-files { display: flex; }
#file-preview-strip::-webkit-scrollbar { display: none; }
#upload-thumbs { display: flex; flex-direction: row; gap: 10px; flex-wrap: nowrap; }

/* ── FILE THUMB CARDS ───────────────────── */
.doc-thumb {
  position: relative;
  width: 140px; min-width: 140px; height: 110px;
  border-radius: 10px; overflow: hidden;
  background: #fff; flex-shrink: 0;
}
.thumb-top { width: 100%; height: 72px; overflow: hidden; background: #f0f0f0; }
.thumb-img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
.thumb-bottom {
  height: 38px; padding: 0 8px;
  display: flex; align-items: center; gap: 6px;
  background: #fff;
}
.badge {
  font-size: 9px; font-weight: 800;
  background: #1a1a1a; color: #fff;
  padding: 2px 5px; border-radius: 3px;
  letter-spacing: 0.05em; flex-shrink: 0;
}
.thumb-filename { font-size: 11px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.upload-status { font-size: 10px; color: #888; font-weight: 600; flex-shrink: 0; }
.thumb-close {
  position: absolute; top: 5px; left: 5px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55); color: white;
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10; transition: background 0.15s; user-select: none;
}
.thumb-close:hover { background: rgba(0,0,0,0.85); }

/* ── FILE ATTACHMENT IN CHAT BUBBLE ─── */
.chat-file-thumb {
  position: relative;
  width: 120px;
  min-width: 120px;
  height: 96px;
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  flex-shrink: 0;
  cursor: default;
}
.chat-file-thumb .thumb-top { width: 100%; height: 62px; overflow: hidden; background: #f0f0f0; }
.chat-file-thumb .thumb-img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
.chat-file-thumb .thumb-bottom {
  height: 34px; padding: 0 7px;
  display: flex; align-items: center; gap: 5px;
  background: #fff;
}
.chat-file-thumb .thumb-filename { font-size: 10px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

.user-files-row {
  display: flex;
  flex-direction: row;
  gap: 8px;
  flex-wrap: nowrap;
  overflow-x: auto;
  justify-content: flex-end;
  margin-bottom: 6px;
  scrollbar-width: none;
}
.user-files-row::-webkit-scrollbar { display: none; }

/* ── INPUT BAR ──────────────────────────── */
#input-bar {
  width: 100%;
  background: #232018;
  border-radius: 18px;
  padding: 14px 14px 14px 18px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.07);
  transition: border-color 0.2s;
}
#input-bar:focus-within { border-color: rgba(201,122,58,0.4); }

#input-textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #f0ede8;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  resize: none;
  max-height: 160px;
  overflow-y: auto;
  line-height: 1.6;
  scrollbar-width: none;
  padding-bottom: 2px;
}
#input-textarea::placeholder { color: #4a4540; }
#input-textarea::-webkit-scrollbar { display: none; }

#input-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  padding-bottom: 1px;
}

.icon-btn {
  background: transparent;
  border: none;
  color: #5a5048;
  cursor: pointer;
  padding: 7px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
  text-decoration: none;
  font-family: 'Material Symbols Outlined';
  font-size: 20px;
  font-weight: 300;
  font-style: normal;
  line-height: 1;
  letter-spacing: normal;
}
.icon-btn:hover { color: #f0ede8; background: rgba(255,255,255,0.07); }

#send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #c97a3a;
  border: none; color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
  font-family: 'Material Symbols Outlined';
  font-size: 18px;
  font-weight: 300;
  font-style: normal;
  line-height: 1;
  letter-spacing: normal;
}
#send-btn:hover:not(:disabled) { background: #e08840; transform: scale(1.05); }
#send-btn:disabled { background: #2e2925; color: #4a4540; cursor: not-allowed; transform: none; }

/* ── DISCLAIMER ─────────────────────────── */
#disclaimer {
  text-align: center;
  font-size: 11.5px;
  color: rgba(201,122,58,0.45);
  letter-spacing: 0.01em;
}

/* ── CHAT MESSAGES ──────────────────────── */
.message-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 28px;
}

.message-user {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 6px;
}
.user-bubble {
  background: #2a2520;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px 18px 4px 18px;
  padding: 11px 17px;
  max-width: 72%;
  font-size: 15px;
  line-height: 1.6;
  color: #f0ede8;
  white-space: pre-wrap;
  word-break: break-word;
}

.message-assistant {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.ai-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c97a3a, #e08840);
  color: white;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  font-family: 'Sora', sans-serif;
}
.ai-content-wrap { flex: 1; min-width: 0; }

.ai-text {
  font-size: 15px;
  line-height: 1.75;
  color: #e2ddd7;
  max-width: 100%;
}
.ai-text p { margin: 0 0 10px; }
.ai-text p:last-child { margin-bottom: 0; }
.ai-text ul, .ai-text ol {
  padding-left: 22px;
  margin: 8px 0 10px;
}
.ai-text li {
  margin: 3px 0;
  line-height: 1.65;
}
.ai-text ul li { list-style: disc; }
.ai-text ol li { list-style: decimal; }
.ai-text strong { color: #fff; font-weight: 600; }
.ai-text em { font-style: italic; color: #d0c8c0; }
.ai-text h1 { font-size: 21px; font-weight: 700; color: #fff; margin: 18px 0 8px; font-family: 'Sora', sans-serif; }
.ai-text h2 { font-size: 17px; font-weight: 600; color: #fff; margin: 16px 0 6px; }
.ai-text h3 { font-size: 15px; font-weight: 600; color: #f0ede8; margin: 12px 0 4px; }
.ai-text code {
  background: #1e1a16;
  padding: 1px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #ffb782;
}
.ai-text pre {
  background: #141210;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 10px 0;
}
.ai-text pre code {
  background: transparent;
  padding: 0;
  color: #e2ddd7;
  font-size: 13px;
}
.ai-text blockquote {
  border-left: 3px solid #c97a3a;
  padding-left: 14px;
  margin: 10px 0;
  color: #a89880;
  font-style: italic;
}
.ai-text a { color: #ffb782; text-decoration: underline; }

/* ── SOURCES ────────────────────────────── */
.sources-list {
  margin-top: 14px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  font-size: 13px;
  color: #8a8078;
}
.sources-list .sources-header {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(255,183,130,0.5);
  margin-bottom: 6px;
}
.sources-list ul { padding-left: 0; margin: 0; list-style: none; }
.sources-list li {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 0;
  color: #9a9088;
  font-size: 12.5px;
}
.sources-list li::before {
  content: "description";
  font-family: 'Material Symbols Outlined';
  font-size: 14px;
  color: rgba(255,183,130,0.4);
  flex-shrink: 0;
  font-weight: 300;
}

/* ── THINKING BLOCK ──────────────────────── */
.thinking-block {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(201,122,58,0.06);
  border: 1px solid rgba(201,122,58,0.15);
  border-radius: 10px;
  margin-bottom: 12px;
  font-size: 13px;
  color: rgba(255,183,130,0.7);
  animation: fadeInUp 0.2s ease-out;
}
.thinking-block .think-icon {
  font-family: 'Material Symbols Outlined';
  font-size: 16px;
  font-weight: 300;
  line-height: 1;
  animation: spinSlow 2s linear infinite;
}
.thinking-step {
  font-size: 12.5px;
  color: rgba(255,183,130,0.55);
}
@keyframes spinSlow {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── TYPING DOTS ────────────────────────── */
.typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
  margin-top: 2px;
}
.typing-dots span {
  width: 5px; height: 5px;
  background: #6a6058;
  border-radius: 50%;
  animation: tdBounce 1.3s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes tdBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ── STREAMING CURSOR ───────────────────── */
.stream-cursor {
  display: inline-block;
  width: 2px; height: 15px;
  background: #c97a3a;
  margin-left: 2px;
  vertical-align: middle;
  animation: cursorBlink 0.8s step-end infinite;
}
@keyframes cursorBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ── ANIMATIONS ─────────────────────────── */
@keyframes slideInRight {
  from { transform: translateX(12px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.user-message-slide { animation: slideInRight 0.18s ease-out; }

@keyframes fadeInUp {
  from { transform: translateY(6px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.ai-message-fadein { animation: fadeInUp 0.2s ease-out; }

@keyframes aiPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201,122,58,0); }
  50%       { box-shadow: 0 0 0 5px rgba(201,122,58,0.18); }
}
.ai-pulse { animation: aiPulse 2s ease-in-out infinite; }

/* ── MOBILE HEADER ──────────────────────── */
#mobile-header {
  display: none;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 0 16px;
  height: 56px;
  background: rgba(26,20,16,0.9);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
  z-index: 50;
}

/* ── LAYOUT ─────────────────────────────── */
#root {
  display: flex;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

@media (max-width: 768px) {
  #sidebar { display: none; }
  #mobile-header { display: flex; }
  #chat-thread { padding: 16px 16px 0; }
  #bottom-area { padding: 8px 16px 20px; }
  .user-bubble { max-width: 85%; }
}

/* ── SIDEBAR TOGGLE BTN ─────────────────── */
#sidebar-toggle-btn {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 100;
  background: none;
  border: none;
  color: rgba(240,237,232,0.35);
  cursor: pointer;
  padding: 7px;
  border-radius: 8px;
  font-family: 'Material Symbols Outlined';
  font-size: 20px;
  font-weight: 300;
  font-style: normal;
  line-height: 1;
  letter-spacing: normal;
  transition: color 0.15s, background 0.15s;
}
#sidebar-toggle-btn:hover {
  color: #f0ede8;
  background: rgba(255,255,255,0.06);
}

/* ── RENAME INPUT ───────────────────────── */
.rename-input {
  background: #1a1410;
  border: 1px solid rgba(201,122,58,0.4);
  border-radius: 5px;
  color: #f0ede8;
  font-size: 13.5px;
  font-family: 'Inter', sans-serif;
  padding: 2px 6px;
  outline: none;
  width: 100%;
}

/* ── NAME EDIT MODAL ────────────────────── */
#name-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#name-modal-overlay.open { display: flex; }
#name-modal {
  background: #232018;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 28px 28px 24px;
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#name-modal h2 {
  font-family: 'Sora', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #f0ede8;
}
#name-modal p {
  font-size: 13px;
  color: rgba(240,237,232,0.5);
  margin-top: -8px;
}
#name-modal input {
  background: #1a1410;
  border: 1px solid rgba(201,122,58,0.3);
  border-radius: 10px;
  color: #f0ede8;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  padding: 10px 14px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
#name-modal input:focus { border-color: rgba(201,122,58,0.7); }
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.modal-btn {
  padding: 8px 20px;
  border-radius: 9px;
  border: none;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 0.15s;
}
.modal-btn.cancel {
  background: rgba(255,255,255,0.06);
  color: rgba(240,237,232,0.6);
}
.modal-btn.cancel:hover { background: rgba(255,255,255,0.1); }
.modal-btn.save {
  background: #c97a3a;
  color: #fff;
}
.modal-btn.save:hover { background: #e08840; }
</style>
</head>
<body>

<div id="root">

<!-- ═══ SIDEBAR ════════════════════════════════════════════ -->
<aside id="sidebar">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 6px 20px;flex-shrink:0;">
    <div>
      <div style="font-family:'Sora',sans-serif;font-size:19px;font-weight:700;color:#ffb782;letter-spacing:-0.3px;">AmberMind</div>
      <div style="font-size:10.5px;color:rgba(255,183,130,0.4);margin-top:1px;">Sophisticated Workspace</div>
    </div>
  </div>

  <button onclick="createNewChat()"
    style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:rgba(201,122,58,0.1);border:1px solid rgba(201,122,58,0.2);border-radius:10px;cursor:pointer;color:#ffb782;font-size:13.5px;font-family:'Inter',sans-serif;transition:background 0.15s,border-color 0.15s;margin-bottom:4px;"
    onmouseenter="this.style.background='rgba(201,122,58,0.18)';this.style.borderColor='rgba(201,122,58,0.35)'"

      <span id="user-name-sidebar" class="item-label" style="color:#f0ede8;font-size:13.5px;">Krish</span>

<!-- ═══ NAME EDIT MODAL ══════════════════════════════════════ -->
<div id="name-modal-overlay" onclick="handleOverlayClick(event)">
  <div id="name-modal">
    <h2>Edit your name</h2>
    <p>This will update your greeting and account display.</p>
    <input type="text" id="name-modal-input" placeholder="Enter your name" maxlength="40"/>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeNameModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveNameModal()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── REFS ────────────────────────────────────────────────────────────
const inputEl        = document.getElementById('input-textarea');
const sendBtn        = document.getElementById('send-btn');
const fileInput      = document.getElementById('file-input');
const uploadThumbs   = document.getElementById('upload-thumbs');
const fileStrip      = document.getElementById('file-preview-strip');
const homeScreen     = document.getElementById('home-screen');
const chatThreadWrap = document.getElementById('chat-thread-wrap');
const chatThread     = document.getElementById('chat-thread');
const msgContainer   = document.getElementById('messages-container');
const sidebarEl      = document.getElementById('sidebar');
const historyEl      = document.getElementById('sidebar-history');
const greetingEl     = document.getElementById('greeting');
const toggleBtn      = document.getElementById('sidebar-toggle-btn');

// ─── STATE ───────────────────────────────────────────────────────────
// Files staged in input bar, per-send: cleared after each send
const selectedFiles = new Map();

// Sessions stored in localStorage
let sessions = [];
try { sessions = JSON.parse(localStorage.getItem('am_sessions') || '[]'); } catch(e) { sessions = []; }
let currentSessionId = null;
let isStreaming = false;

// User name
let userName = localStorage.getItem('am_username') || 'Krish';

// ─── INIT ─────────────────────────────────────────────────────────────
applyUserName();
renderSidebar();
updateGreeting();

// ─── USER NAME ───────────────────────────────────────────────────────
function applyUserName() {
  document.getElementById('user-name-sidebar').textContent = userName;
  const avatarEl = document.getElementById('user-avatar-sidebar');
  avatarEl.textContent = userName.trim().charAt(0).toUpperCase() || '?';
  updateGreeting();
}

function updateGreeting() {
  const h = new Date().getHours();
  const part = h < 12 ? 'Morning' : h < 17 ? 'Afternoon' : 'Evening';
  greetingEl.textContent = `${part}, ${userName}`;
}

function openNameModal() {
  document.getElementById('name-modal-input').value = userName;
  document.getElementById('name-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('name-modal-input').focus(), 50);
}

function closeNameModal() {
  document.getElementById('name-modal-overlay').classList.remove('open');
}

function saveNameModal() {
  const val = document.getElementById('name-modal-input').value.trim();
  if (!val) return;
  userName = val;
  localStorage.setItem('am_username', userName);
  applyUserName();
  closeNameModal();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('name-modal-overlay')) closeNameModal();
}

document.getElementById('name-modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveNameModal();
  if (e.key === 'Escape') closeNameModal();
});

// ─── SHOW / HIDE CHAT ────────────────────────────────────────────────
function showChat() {
  homeScreen.style.display = 'none';
  chatThreadWrap.style.display = 'block';
}

function showHome() {
  homeScreen.style.display = 'flex';
  chatThreadWrap.style.display = 'none';
}

// ─── SIDEBAR TOGGLE ──────────────────────────────────────────────────
function toggleSidebar() {
  const collapsed = sidebarEl.classList.toggle('collapsed');
  toggleBtn.textContent = collapsed ? 'menu' : 'menu';
  // icon stays as menu; feel free to switch to 'dock_to_left' when open
  toggleBtn.style.left = collapsed ? '14px' : '14px';
}

// ─── INPUT RESIZE + ENABLE ───────────────────────────────────────────
function handleInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  sendBtn.disabled = isStreaming || (inputEl.value.trim().length === 0 && selectedFiles.size === 0);
}
inputEl.addEventListener('input', handleInput);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

// ─── SUGGESTION CHIPS ────────────────────────────────────────────────
function useChip(text) {
  inputEl.value = text;
  handleInput();
  inputEl.focus();
}

// ─── SESSION MANAGEMENT ──────────────────────────────────────────────
function saveSessions() {
  try { localStorage.setItem('am_sessions', JSON.stringify(sessions)); } catch(e) {}
}

function getOrCreateSession(firstMessage) {
  if (currentSessionId) return currentSessionId;
  const id = 'sess_' + Date.now();
  const title = firstMessage.length > 40 ? firstMessage.slice(0, 40) + '…' : firstMessage;
  sessions.unshift({ id, title, created: Date.now(), messages: [] });
  currentSessionId = id;
  saveSessions();
  renderSidebar();
  return id;
}

function getCurrentSession() {
  return sessions.find(s => s.id === currentSessionId);
}

function addMessageToSession(role, content, sources, filesMeta) {
  const sess = getCurrentSession();
  if (!sess) return;
  sess.messages.push({ role, content, sources: sources || [], filesMeta: filesMeta || [], ts: Date.now() });
  saveSessions();
}

function renderSidebar() {
  if (!sessions.length) {
    historyEl.innerHTML = `<div style="font-size:12.5px;color:rgba(240,237,232,0.25);padding:12px 10px;text-align:center;">No conversations yet</div>`;
    return;
  }

  const now = new Date();
  const groups = { Today: [], Yesterday: [], 'This week': [], Older: [] };
  sessions.forEach(s => {
    const d = new Date(s.created);
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays === 0) groups['Today'].push(s);
    else if (diffDays === 1) groups['Yesterday'].push(s);
    else if (diffDays < 7) groups['This week'].push(s);
    else groups['Older'].push(s);
  });

  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="sidebar-section-label">${label}</div>`;
    items.forEach(s => {
      const isActive = s.id === currentSessionId;
      html += `
        <div class="sidebar-item ${isActive ? 'active' : ''}" id="sess-${s.id}" onclick="loadSession('${s.id}')">
          <span class="mat-icon" style="color:${isActive ? '#ffb782' : 'rgba(240,237,232,0.3)'}">chat_bubble</span>
          <span class="item-label" id="sess-label-${s.id}">${escapeHtml(s.title)}</span>
          <div class="item-actions">
            <button title="Rename" onclick="event.stopPropagation();renameSession('${s.id}')">edit</button>
            <button title="Delete" onclick="event.stopPropagation();deleteSession('${s.id}')">delete</button>
          </div>
        </div>`;
    });
  }
  historyEl.innerHTML = html;
}

function loadSession(id) {
  const sess = sessions.find(s => s.id === id);
  if (!sess) return;
  currentSessionId = id;

  msgContainer.innerHTML = '';
  showChat();

  sess.messages.forEach(m => {
    if (m.role === 'user') appendUserMessage(m.content, m.filesMeta || [], false);
    else appendAIMessage(m.content, m.sources || [], false);
  });

  scrollToBottom();
  renderSidebar();
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentSessionId === id) createNewChat();
  else renderSidebar();
}

function renameSession(id) {
  const labelEl = document.getElementById('sess-label-' + id);
  if (!labelEl) return;
  const sess = sessions.find(s => s.id === id);
  if (!sess) return;

  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = sess.title;
  labelEl.replaceWith(input);
  input.focus();
  input.select();

  const finish = () => {
    const newTitle = input.value.trim() || sess.title;
    sess.title = newTitle;
    saveSessions();
    renderSidebar();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = sess.title; input.blur(); }
  });
}

// ─── SEND MESSAGE ────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if ((!text && selectedFiles.size === 0) || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;

  getOrCreateSession(text || 'File upload');
  showChat();

  // Snapshot current files before clearing
  const filesSnapshot = [];
  selectedFiles.forEach(meta => {
    filesSnapshot.push({
      name: meta.file.name,
      type: meta.file.type,
      previewDataUrl: meta.previewDataUrl || null,
    });
  });

  appendUserMessage(text, filesSnapshot, true);
  addMessageToSession('user', text, [], filesSnapshot);

  inputEl.value = '';
  inputEl.style.height = 'auto';
  clearFilePreviews();

  const thinkEl = showThinkingBlock();
  const { wrapper, textEl, cursorEl } = createAIMessageShell();

  let fullText = '';
  let sources = [];

  try {
    const data = await callChatAPI(text);
    thinkEl.remove();
    fullText = data.response || data.message || data.content || 'No response received.';
    sources = data.sources || [];
    await streamTextInto(textEl, cursorEl, fullText);
  } catch (err) {
    thinkEl.remove();
    fullText = 'Something went wrong: ' + (err.message || 'Unable to contact server.');
    await streamTextInto(textEl, cursorEl, fullText);
  }

  cursorEl.remove();
  if (sources.length > 0) {
    wrapper.querySelector('.ai-content-wrap').appendChild(buildSourcesEl(sources));
  }

  addMessageToSession('assistant', fullText, sources, []);
  isStreaming = false;
  sendBtn.disabled = inputEl.value.trim().length === 0 && selectedFiles.size === 0;
  scrollToBottom();
}

// ─── THINKING BLOCK ──────────────────────────────────────────────────
function showThinkingBlock() {
  const steps = [
    { icon: 'search', text: 'Searching uploaded documents…' },
    { icon: 'psychology', text: 'Retrieving relevant chunks…' },
    { icon: 'auto_awesome', text: 'Generating response…' },
  ];

  const wrap = document.createElement('div');
  wrap.className = 'message-assistant ai-message-fadein';
  wrap.style.marginBottom = '0';

  const avatar = document.createElement('div');
  avatar.className = 'ai-avatar ai-pulse';
  avatar.textContent = 'A';

  const inner = document.createElement('div');
  inner.className = 'ai-content-wrap';

  let stepIdx = 0;
  const block = document.createElement('div');
  block.className = 'thinking-block';

  const iconEl = document.createElement('span');
  iconEl.className = 'think-icon';
  iconEl.style.fontFamily = "'Material Symbols Outlined'";
  iconEl.style.fontWeight = '300';

  const stepTextEl = document.createElement('span');
  stepTextEl.className = 'thinking-step';

  block.append(iconEl, stepTextEl);
  inner.appendChild(block);
  wrap.append(avatar, inner);
  msgContainer.appendChild(wrap);
  scrollToBottom();

  const updateStep = () => {
    const s = steps[stepIdx % steps.length];
    iconEl.textContent = s.icon;
    stepTextEl.textContent = s.text;
    stepIdx++;
  };
  updateStep();
  const interval = setInterval(updateStep, 900);

  return { remove: () => { clearInterval(interval); wrap.remove(); } };
}

// ─── AI MESSAGE SHELL ─────────────────────────────────────────────────
function createAIMessageShell() {
  const wrapper = document.createElement('div');
  wrapper.className = 'message-group ai-message-fadein';

  const row = document.createElement('div');
  row.className = 'message-assistant';

  const avatar = document.createElement('div');
  avatar.className = 'ai-avatar';
  avatar.textContent = 'A';

  const contentWrap = document.createElement('div');
  contentWrap.className = 'ai-content-wrap';

  const textEl = document.createElement('div');
  textEl.className = 'ai-text';

  const cursorEl = document.createElement('span');
  cursorEl.className = 'stream-cursor';

  textEl.appendChild(cursorEl);
  contentWrap.appendChild(textEl);
  row.append(avatar, contentWrap);
  wrapper.appendChild(row);
  msgContainer.appendChild(wrapper);
  scrollToBottom();

  return { wrapper, textEl, cursorEl };
}

// ─── STREAM TEXT ─────────────────────────────────────────────────────
async function streamTextInto(textEl, cursorEl, fullText) {
  const words = fullText.split(' ');
  let built = '';
  const BATCH = 3;
  const DELAY = 18;

  for (let i = 0; i < words.length; i += BATCH) {
    built += (i === 0 ? '' : ' ') + words.slice(i, i + BATCH).join(' ');
    textEl.innerHTML = renderMarkdown(built) + '<span class="stream-cursor"></span>';
    scrollToBottom();
    await sleep(DELAY);
  }

  textEl.innerHTML = renderMarkdown(fullText);
  textEl.appendChild(cursorEl);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── BACKEND CALL ────────────────────────────────────────────────────
async function callChatAPI(message) {
  const res = await fetch('http://127.0.0.1:8000/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message })
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`HTTP ${res.status}: ${txt || res.statusText}`);
  }
  return res.json();
}

// ─── APPEND USER MESSAGE ─────────────────────────────────────────────
// filesSnapshot: array of { name, type, previewDataUrl }
function appendUserMessage(text, filesSnapshot, animate) {
  const group = document.createElement('div');
  group.className = 'message-group';

  // File thumbnails row (if any files)
  if (filesSnapshot && filesSnapshot.length > 0) {
    const row = document.createElement('div');
    row.className = `user-files-row ${animate ? 'user-message-slide' : ''}`;

    filesSnapshot.forEach(f => {
      const card = buildChatFileThumb(f);
      row.appendChild(card);
    });

    group.appendChild(row);
  }

  // Text bubble (if any text)
  if (text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message-user ${animate ? 'user-message-slide' : ''}`;
    const bubble = document.createElement('div');
    bubble.className = 'user-bubble';
    bubble.textContent = text;
    msgDiv.appendChild(bubble);
    group.appendChild(msgDiv);
  }

  msgContainer.appendChild(group);
  scrollToBottom();
}

// ─── CHAT FILE THUMB ─────────────────────────────────────────────────
function buildChatFileThumb(fileMeta) {
  const card = document.createElement('div');
  card.className = 'chat-file-thumb';

  const typeLabel = fileMeta.type && fileMeta.type.includes('pdf') ? 'PDF'
                  : fileMeta.type && fileMeta.type.startsWith('image') ? 'IMG' : 'FILE';

  const top = document.createElement('div');
  top.className = 'thumb-top';

  if (fileMeta.previewDataUrl) {
    const img = document.createElement('img');
    img.className = 'thumb-img';
    img.src = fileMeta.previewDataUrl;
    top.appendChild(img);
  } else {
    top.style.background = '#2a2420';
    top.style.display = 'flex';
    top.style.alignItems = 'center';
    top.style.justifyContent = 'center';
    const icon = document.createElement('span');
    icon.style.fontFamily = "'Material Symbols Outlined'";
    icon.style.fontSize = '28px';
    icon.style.color = 'rgba(255,183,130,0.4)';
    icon.style.fontWeight = '300';
    icon.textContent = 'description';
    top.appendChild(icon);
  }

  const bottom = document.createElement('div');
  bottom.className = 'thumb-bottom';

  const badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = typeLabel;

  const nameSpan = document.createElement('div');
  nameSpan.className = 'thumb-filename';
  nameSpan.textContent = fileMeta.name;

  bottom.append(badge, nameSpan);
  card.append(top, bottom);
  return card;
}

// ─── APPEND AI MESSAGE (for loading sessions) ────────────────────────
function appendAIMessage(text, sources, animate) {
  const wrapper = document.createElement('div');
  wrapper.className = 'message-group' + (animate ? ' ai-message-fadein' : '');

  const row = document.createElement('div');
  row.className = 'message-assistant';

  const avatar = document.createElement('div');
  avatar.className = 'ai-avatar';
  avatar.textContent = 'A';

  const contentWrap = document.createElement('div');
  contentWrap.className = 'ai-content-wrap';

  const textEl = document.createElement('div');
  textEl.className = 'ai-text';
  textEl.innerHTML = renderMarkdown(text);
  contentWrap.appendChild(textEl);

  if (sources && sources.length > 0) contentWrap.appendChild(buildSourcesEl(sources));

  row.append(avatar, contentWrap);
  wrapper.appendChild(row);
  msgContainer.appendChild(wrapper);
}

// ─── SOURCES ELEMENT ─────────────────────────────────────────────────
function buildSourcesEl(sources) {
  const div = document.createElement('div');
  div.className = 'sources-list';
  const items = sources.map(s => {
    const name = s.source ? s.source.split('/').pop() : 'source';
    const page = s.page ? ` · page ${s.page}` : '';
    return `<li>${escapeHtml(name)}${escapeHtml(page)}</li>`;
  }).join('');
  div.innerHTML = `<div class="sources-header">Sources</div><ul>${items}</ul>`;
  return div;
}

// ─── MARKDOWN RENDERER (fixed ordered lists) ─────────────────────────
function renderMarkdown(raw) {
  if (!raw) return '';
  let s = String(raw);

  // Extract code blocks first
  const codeBlocks = [];
  s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
    codeBlocks.push(code.trim());
    return `\x00CODE${codeBlocks.length - 1}\x00`;
  });

  // Escape HTML (except placeholders)
  s = escapeHtml(s);

  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // Bold / italic
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,     '<em>$1</em>');

  // Blockquote
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // ── Ordered lists: preserve actual numbers ──────────────────────────
  // Match lines like "1. item", "2. item", etc.
  s = s.replace(/^(\d+)\.\s+(.+)$/gm, '<li data-n="$1">$2</li>');
  // Wrap consecutive <li data-n> into <ol> with correct start
  s = s.replace(/(<li data-n="\d+">[^]*?<\/li>\n?)+/g, match => {
    // Extract the first number to set start attribute
    const firstNum = match.match(/data-n="(\d+)"/);
    const start = firstNum ? parseInt(firstNum[1]) : 1;
    // Strip data-n attribute
    const items = match.replace(/ data-n="\d+"/g, '');
    return `<ol start="${start}">${items}</ol>`;
  });

  // Unordered lists
  s = s.replace(/^[-•*]\s+(.+)$/gm, '<li>$1</li>');
  // Wrap consecutive bare <li> (not inside ol already) into <ul>
  s = s.replace(/(<li>(?!.*data-n)[\s\S]*?<\/li>\n?)+/g, m => {
    // Only wrap if not already inside ol
    if (m.includes('data-n')) return m;
    return `<ul>${m}</ul>`;
  });

  // Paragraphs
  s = s.replace(/\n\n+/g, '</p><p>');
  s = s.replace(/\n/g, '<br>');
  s = `<p>${s}</p>`;
  s = s.replace(/<p>(<(?:h[123]|ul|ol|pre|blockquote)[^>]*>)/g, '$1');
  s = s.replace(/(<\/(?:h[123]|ul|ol|pre|blockquote)>)<\/p>/g, '$1');

  // Restore code blocks
  s = s.replace(/\x00CODE(\d+)\x00/g, (_, i) =>
    `<pre><code>${escapeHtml(codeBlocks[parseInt(i)])}</code></pre>`);

  return s;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── SCROLL ──────────────────────────────────────────────────────────
function scrollToBottom() {
  chatThreadWrap.scrollTo({ top: chatThreadWrap.scrollHeight, behavior: 'smooth' });
}

// ─── FILE STRIP UI ────────────────────────────────────────────────────
function updateUploadUI() {
  if (selectedFiles.size > 0) {
    fileStrip.classList.add('has-files');
    fileStrip.style.display = 'flex';
  } else {
    fileStrip.classList.remove('has-files');
    fileStrip.style.display = 'none';
  }
  sendBtn.disabled = isStreaming || (inputEl.value.trim().length === 0 && selectedFiles.size === 0);
}

function clearFilePreviews() {
  selectedFiles.forEach(meta => { try { URL.revokeObjectURL(meta.url); } catch(e){} });
  selectedFiles.clear();
  uploadThumbs.innerHTML = '';
  updateUploadUI();
}

fileInput.addEventListener('change', () => {
  Array.from(fileInput.files || []).forEach(f => addAndUploadFile(f));
  fileInput.value = '';
});

function addAndUploadFile(file) {
  (async () => {
    const id  = `${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
    const url = URL.createObjectURL(file);
    const typeLabel = file.type.includes('pdf') ? 'PDF'
                    : file.type.startsWith('image') ? 'IMG' : 'FILE';

    const card = document.createElement('div');
    card.className = 'doc-thumb';
    card.id = 'upload-entry-' + id;

    const closeBtn = document.createElement('div');
    closeBtn.className = 'thumb-close';
    closeBtn.title = 'Remove';
    closeBtn.textContent = '✕';
    closeBtn.addEventListener('click', () => removeFileEntry(id));

    const top = document.createElement('div'); top.className = 'thumb-top';
    const img = document.createElement('img'); img.className = 'thumb-img';
    top.appendChild(img);

    const bottom = document.createElement('div'); bottom.className = 'thumb-bottom';
    const badge = document.createElement('div'); badge.className = 'badge'; badge.textContent = typeLabel;
    const nameSpan = document.createElement('div'); nameSpan.className = 'thumb-filename'; nameSpan.textContent = file.name;
    const statusEl = document.createElement('div'); statusEl.className = 'upload-status';
    bottom.append(badge, nameSpan, statusEl);
    card.append(closeBtn, top, bottom);
    uploadThumbs.appendChild(card);

    let previewDataUrl = null;

    selectedFiles.set(id, { file, id, url, element: card, uploaded: false, serverPath: null, previewDataUrl: null });
    updateUploadUI();

    try {
      if (file.type === 'application/pdf') {
        await ensurePdfJsLoaded();
        await renderPDFPreview(file, img);
        previewDataUrl = img.src; // capture data URL after rendering
      } else if (file.type.startsWith('image/')) {
        img.src = url;
        // convert blob to data URL for persistence
        previewDataUrl = await blobToDataURL(file);
      } else {
        top.style.background = '#2a2420';
      }
      // store preview for chat display
      const m = selectedFiles.get(id);
      if (m) m.previewDataUrl = previewDataUrl;
    } catch(e) { top.style.background = '#2a2420'; }

    await uploadFileEntry(id);
  })();
}

function blobToDataURL(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

let _pdfJsLoading = null;
function ensurePdfJsLoaded() {
  if (window.pdfjsLib) return Promise.resolve();
  if (_pdfJsLoading) return _pdfJsLoading;
  _pdfJsLoading = new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc.onload = () => {
      if (window.pdfjsLib)
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve();
    };
    sc.onerror = () => reject(new Error('Failed to load PDF.js'));
    document.head.appendChild(sc);
  });
  return _pdfJsLoading;
}

async function renderPDFPreview(file, imgEl) {
  const blobUrl = URL.createObjectURL(file);
  const pdf  = await window.pdfjsLib.getDocument(blobUrl).promise;
  const page = await pdf.getPage(1);
  const vp   = page.getViewport({ scale: 1.2 });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  imgEl.src = canvas.toDataURL();
  URL.revokeObjectURL(blobUrl);
}

async function uploadFileEntry(id) {
  const meta = selectedFiles.get(id);
  if (!meta) return;
  const statusEl = meta.element.querySelector('.upload-status');
  if (statusEl) statusEl.textContent = '↑';
  try {
    const form = new FormData();
    form.append('file', meta.file);
    const res = await fetch('http://127.0.0.1:8000/upload', { method: 'POST', body: form });
    if (!res.ok) throw new Error(await res.text() || 'Upload failed');
    if (statusEl) statusEl.textContent = '✓';
    meta.uploaded   = true;
    meta.serverPath = `uploads/${meta.file.name}`;
  } catch(err) {
    if (statusEl) statusEl.textContent = '✗';
    console.error('Upload failed:', meta.file.name, err);
  }
}

async function removeFileEntry(id) {
  const meta = selectedFiles.get(id);
  if (!meta) return;
  if (meta.uploaded && meta.serverPath) {
    try {
      await fetch(`http://127.0.0.1:8000/upload?filename=${encodeURIComponent(meta.file.name)}`, { method: 'DELETE' });
    } catch(e) {}
  }
  try { URL.revokeObjectURL(meta.url); } catch(e) {}
  meta.element.remove();
  selectedFiles.delete(id);
  updateUploadUI();
}

// ─── NEW CHAT ─────────────────────────────────────────────────────────
// Each new chat is completely fresh — no files, no messages, new session
function createNewChat() {
  currentSessionId = null;    // force new session on next send
  msgContainer.innerHTML = '';
  showHome();
  clearFilePreviews();
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  isStreaming = false;
  updateGreeting();           // refresh greeting in case name changed
  renderSidebar();
}
